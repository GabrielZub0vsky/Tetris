<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Tetris{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: monospace;
      min-height: 100vh;
    }
    nav {
      background: #1a1a2e;
      padding: 0.75rem 1.5rem;
      display: flex;
      gap: 1.5rem;
      align-items: center;
      border-bottom: 1px solid #333;
    }
    nav a {
      color: #7eb8f7;
      text-decoration: none;
      font-size: 0.95rem;
    }
    nav a:hover { color: #fff; }
    nav .spacer { flex: 1; }
    nav span { color: #888; font-size: 0.85rem; }
    main {
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }
    h1 { color: #7eb8f7; margin-bottom: 1.25rem; font-size: 1.5rem; }
    h2 { color: #aaa; margin-bottom: 1rem; font-size: 1.1rem; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1.5rem;
    }
    th, td {
      text-align: left;
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid #222;
    }
    th { color: #888; font-size: 0.8rem; text-transform: uppercase; }
    tr:hover td { background: #141420; }
    a { color: #7eb8f7; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .card {
      background: #111;
      border: 1px solid #222;
      border-radius: 6px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    form { display: flex; flex-direction: column; gap: 0.75rem; max-width: 320px; }
    label { color: #aaa; font-size: 0.85rem; }
    input[type=text], input[type=password] {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      color: #e0e0e0;
      padding: 0.5rem 0.75rem;
      font-family: monospace;
      font-size: 0.95rem;
      width: 100%;
    }
    input:focus { outline: 1px solid #7eb8f7; border-color: #7eb8f7; }
    button[type=submit] {
      background: #1a3a6a;
      border: 1px solid #7eb8f7;
      border-radius: 4px;
      color: #7eb8f7;
      cursor: pointer;
      font-family: monospace;
      font-size: 0.95rem;
      padding: 0.5rem 1rem;
      margin-top: 0.25rem;
    }
    button[type=submit]:hover { background: #2a4a8a; }
    .error { color: #f77; font-size: 0.85rem; }
    .badge-won  { color: #5f5; }
    .badge-lost { color: #f55; }
    .badge-draw { color: #fa5; }
    .stats { display: flex; gap: 2rem; margin-bottom: 1.5rem; }
    .stat-box { text-align: center; }
    .stat-box .num { font-size: 2rem; font-weight: bold; }
    .stat-box .lbl { color: #666; font-size: 0.75rem; text-transform: uppercase; }
    .online-dot {
      display: inline-block;
      width: 8px; height: 8px;
      background: #5f5;
      border-radius: 50%;
      margin-right: 6px;
    }
  </style>
</head>
<body>
  <nav>
    <a href="/users">Users</a>
    <a href="/online">Online</a>
    <a href="/lobbies">Lobbies</a>
    <div class="spacer"></div>
    {% if current_user %}
      <span>{{ current_user }}</span>
      <form method="post" action="/logout" style="display:inline;max-width:none;margin:0">
        <button type="submit" style="background:none;border:none;color:#888;cursor:pointer;font-family:monospace;font-size:0.85rem;padding:0">logout</button>
      </form>
    {% else %}
      <a href="/login">Login</a>
      <a href="/signup">Signup</a>
    {% endif %}
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
